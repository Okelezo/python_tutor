<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Python Project Tutor</title>
    <link rel="stylesheet" href="/static/site.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1>Python Project Tutor</h1>
        <p class="muted">Learn by reading, coding, and getting instant feedback.</p>
        <div class="row" style="margin-top:10px">
          <div class="muted">Signed in as {{ user.email }}</div>
          <form method="post" action="/auth/logout">
            <button class="btn secondary" type="submit">Logout</button>
          </form>
        </div>
      </header>

      <section class="card">
        <h2>Tracks</h2>
        <div class="grid">
          {% for track in tracks %}
          <a class="track" href="/track/{{ track.id }}">
            <div class="row">
              <div>
                <div class="title">{{ track.title }}</div>
                <div class="muted">{{ track.level }} • {{ track.description }}</div>
              </div>
              <div class="pill">Open</div>
            </div>
          </a>
          {% endfor %}
        </div>
      </section>

      <footer class="footer">
        <span class="muted">Progress is stored locally in ~/.pytutor/progress.json</span>
      </footer>
    </div>
  </body>
</html>
