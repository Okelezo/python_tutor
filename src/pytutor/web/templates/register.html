<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register - Python Project Tutor</title>
    <link rel="stylesheet" href="/static/site.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1>Create account</h1>
        <p class="muted">Accounts let you keep progress across devices.</p>
      </header>

      <section class="card">
        {% if error %}
        <div class="result bad">
          <strong>{{ error }}</strong>
        </div>
        {% endif %}

        <form method="post">
          <label class="label">Email</label>
          <input class="input" type="email" name="email" required />

          <label class="label" style="margin-top:12px">Password</label>
          <input class="input" type="password" name="password" minlength="8" required />

          <div class="actions">
            <button class="btn" type="submit">Register</button>
            <a class="link" href="/auth/login">Back to login</a>
          </div>
        </form>
      </section>
    </div>
  </body>
</html>
